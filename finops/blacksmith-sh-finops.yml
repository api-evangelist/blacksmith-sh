description: >-
  FinOps view of Blacksmith spend. Blacksmith bills a usage-based, per-minute
  compute model for GitHub Actions runners, metered by runner family
  (Ubuntu x64 ~$0.004/min, Ubuntu ARM64 ~$0.0025/min, Windows ~$0.008/min at
  2 vCPU, scaling with vCPU count; macOS Apple Silicon ~$0.08/min). Each
  account includes 3,000 free minutes per month and 25 GB of free cache
  storage per repository per week. Persistent-storage features (Docker layer
  caching and Sticky Disks at +$0.50/GB/month) and static IPs (+$100/IP/month)
  are add-ons. Because Blacksmith runners are roughly 2x faster and exactly
  half the per-minute cost of GitHub-hosted runners, total CI spend typically
  drops about 75%.
notes: >-
  Per-minute and add-on rates are subject to change; verify against the
  Blacksmith pricing page during reconciliation. No public REST API billing
  exists - spend is governed by minutes consumed and storage retained.
