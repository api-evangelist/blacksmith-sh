meters:
- name: runner_minutes
  description: Compute minutes consumed by CI jobs, billed per minute per runner family and scaled by vCPU count.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - organization
  - runner_family
  - vcpu
- name: free_minutes
  description: First 3,000 minutes per month included at no charge per account.
  unit: minutes
  aggregation: sum
  dimensions:
  - account
- name: cache_storage_gb
  description: Co-located CI cache storage; 25 GB per repository per week included, overflow subject to cache eviction.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - repository
- name: docker_layer_cache_gb
  description: Docker layer cache retained on sticky disks, billed at $0.50 per GB per month.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - repository
- name: sticky_disk_gb
  description: Persistent Sticky Disk storage, billed at $0.50 per GB per month.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - repository
- name: static_ip_count
  description: Dedicated static IPs for runner egress, billed at $100 per IP per month.
  unit: ip_address
  aggregation: max
  dimensions:
  - account
  - organization
principles:
- name: Visibility
  description: Use the Blacksmith CI Analytics dashboard to monitor minutes, cost, and runtime across the team.
- name: Allocation
  description: Map runner minutes to repositories, workflows, and runner families; attribute cache and static-IP add-ons per repo.
- name: Optimization
  description: Right-size runner instance types, prefer ARM64 runners where compatible (lowest per-minute rate), enable cache and Docker layer caching to consume fewer minutes, and stay within the 3,000 included minutes where possible.
- name: Accountability
  description: Review monthly minutes and storage spend against budget; assign owners per repository/workflow.
